name: release

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build_publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          experimental: true
          cache: false

      - name: Build / prepare dist
        run: mise run build

      - name: Backup artifact permissions
        run: cd dist && getfacl -R . > permissions-backup.acl
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-artifact
          path: dist
          overwrite: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: 'dist/**/*.tgz,dist/**/*.jar,dist/**/*.whl,dist/**/*.nupkg,dist/**/*.zip'

      - name: Attach provenance to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          ARTIFACT="$(find dist -name '*.tgz' | head -1)"
          gh attestation download "$ARTIFACT" --repo "$GITHUB_REPOSITORY" || true
          JSONL=$(find . -maxdepth 1 -name "sha256*.jsonl" | head -1)
          if [ -n "$JSONL" ]; then
            mv "$JSONL" provenance.intoto.jsonl
            gh release upload "$TAG_NAME" provenance.intoto.jsonl --clobber
          fi

  publish_npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build_publish
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifact
          path: dist

      - name: Restore build artifact permissions
        run: cd dist && setfacl --restore=permissions-backup.acl
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Release
        env:
          NPM_DIST_TAG: latest
          NPM_REGISTRY: registry.npmjs.org
          NPM_CONFIG_PROVENANCE: 'true'
          NPM_TRUSTED_PUBLISHER: 'true'
        run: npx -p publib@latest publib-npm

  publish_maven:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    needs: build_publish
    permissions:
      contents: read
      packages: write
    steps:
      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          cache: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifact
          path: dist

      - name: Restore build artifact permissions
        run: cd dist && setfacl --restore=permissions-backup.acl
        continue-on-error: true

      - name: Publish
        env:
          MAVEN_SERVER_ID: github
          MAVEN_REPOSITORY_URL: https://maven.pkg.github.com/dbsystel/cdk-sops-secrets
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          MAVEN_USERNAME: ${{ github.actor }}
        run: npx -p publib@latest publib-maven

  publish_pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build_publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifact
          path: dist

      - name: Restore build artifact permissions
        run: cd dist && setfacl --restore=permissions-backup.acl
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'

      - name: Release
        env:
          PYPI_TRUSTED_PUBLISHER: 'true'
        run: npx -p publib@latest publib-pypi

  publish_nuget:
    name: Publish to NuGet Gallery
    runs-on: ubuntu-latest
    needs: build_publish
    permissions:
      contents: read
      packages: write
    steps:
      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
        with:
          cache: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifact
          path: dist

      - name: Restore build artifact permissions
        run: cd dist && setfacl --restore=permissions-backup.acl
        continue-on-error: true

      - name: Publish
        env:
          NUGET_API_KEY: ${{ secrets.GITHUB_TOKEN }}
          NUGET_SERVER: https://nuget.pkg.github.com/dbsystel/index.json
        run: npx -p publib@latest publib-nuget
