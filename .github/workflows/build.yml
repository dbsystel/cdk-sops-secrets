name: build

on:
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@f10502fc09dadecfefb962fff68ce77213930204 # v4
        with:
          experimental: true

      - name: Build (includes lambda test, lambda build, compile, test, integ verify)
        run: mise run build
